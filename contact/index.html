<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dkcomments.com</title>

    <!-- Basic Styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #222;
            color: #fff;
            padding: 1rem 2rem;
        }

        header h1 {
            margin: 0;
        }

        nav {
            margin-top: 0.5rem;
        }

        nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .post {
            background: #fff;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .post h2 {
            margin-top: 0;
        }

        .post p {
            line-height: 1.6;
        }

        .read-more {
            display: inline-block;
            margin-top: 10px;
            color: #007BFF;
            text-decoration: none;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background: #222;
            color: #fff;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<header>
    <h1>DK Comments</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

<div class="container">

    <div class="post">
        <h2>Contact</h2>
        <p>Contact</p>
    </div>

<footer>
    <p>Copyright © 2026 dkcomments.com | All rights reserved | Built with HTML & CSS</p>
</footer>

</body>
</html>
