<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dkcomments.com</title>

    <!-- Basic Styling -->

<style>

    html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
    }

    body {
        display: flex;
        flex-direction: column;
        line-height: 1.6;
    }

    header {
        background-color: var(--header-bg);
        color: var(--header-text);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        font-family: monospace;
    }
    
    header h1 {
        margin: 0;
    }

    header h2 {
        margin-top: 0;
    }

    nav a {
        color: #fff;
        margin-right: 15px;
        text-decoration: none;
    }

    footer {
        text-align: center;
        padding: 0.01rem;
        background: #222;
        color: #fff;
        font-size: 12px;
    }

    .container {
        flex: 1; 
        max-width: 900px;
        width: 100%;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .post {
        background: var(--post-bg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .read-more {
        color: #007BFF;
        text-decoration: none;
        font-weight: bold;
    }

   .read-more:hover {
        text-decoration: underline;
    }

    :root {
    --bg: #f5f5f5;
    --text: #333;
    --header-bg: #222;
    --header-text: #fff;
    --post-bg: #fff;
    }

    .dark-mode {
        --bg: #121212;
        --text: #e0e0e0;
        --header-bg: #000;
        --header-text: #fff;
        --post-bg: #1e1e1e;
    }

</style>
</head>
<body>
<header>
    <h1>DK Comments</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
    <button id="theme-toggle"> Dark Mode</button>
</header>
<div class="container">

    <div class="post">
        <h2>About</h2>
        <p>About</p>
    </div>

</div>
<footer>
    <p>Copyright © 2026 dkcomments.com | All rights reserved | Built with HTML & CSS</p>
</footer>
</body>
<script>
    const button = document.getElementById('theme-toggle');

    // Load saved theme
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    button.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');

        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('theme', 'dark');
        } else {
            localStorage.setItem('theme', 'light');
        }
    });
</script>
</html>
